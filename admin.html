<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Админ-панель | Ринат & Ангелина</title>
    <style>
        body { font-family: 'Raleway', sans-serif; background: #fef7e8; padding: 20px; }
        h1 { font-family: 'Playfair Display', serif; color: #3a6b47; }
        table { border-collapse: collapse; width: 100%; background: white; border-radius: 28px; overflow: hidden; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #4b7b5a; color: white; }
        .yes { color: #2f6e47; font-weight: bold; }
        .no { color: #c27d64; font-weight: bold; }
        .refresh-btn { background: #4b7b5a; color: white; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; margin-bottom: 20px; }
        .refresh-btn:hover { background: #3a5e46; }
    </style>
</head>
<body>
    <h1>🌿 Ответы гостей</h1>
    <button class="refresh-btn" id="refreshBtn">🔄 Обновить</button>
    <div id="responses">Загрузка...</div>

    <script>
        // ⚠️ ВСТАВЬ СВОЙ URL ИЗ RENDER
        const API_URL = 'https://wedding-server-zyzg.onrender.com/api/responses';
        
        async function load() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (!data.length) {
                    document.getElementById('responses').innerHTML = '<p>📭 Пока нет ответов</p>';
                    return;
                }
                
                let html = '<table><thead><tr><th>Время</th><th>Имя</th><th>Присутствие</th><th>Гостей</th><th>Напитки</th><th>Комментарий</th></tr></thead><tbody>';
                data.forEach(r => {
                    html += `<tr>
                        <td>${new Date(r.created_at).toLocaleString()}</td>
                        <td><strong>${escapeHtml(r.name)}</strong></td>
                        <td class="${r.attending === 'yes' ? 'yes' : 'no'}">${r.attending === 'yes' ? '✅ Будет' : '❌ Не будет'}</td>
                        <td>${r.guests}</td>
                        <td>${escapeHtml(r.drinks || '—')}</td>
                        <td>${escapeHtml(r.comment || '—')}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('responses').innerHTML = html;
            } catch (e) {
                document.getElementById('responses').innerHTML = '<p>❌ Ошибка загрузки. Проверь, работает ли сервер.</p>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.getElementById('refreshBtn').addEventListener('click', load);
        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
